<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>
<body>

    <div class="w-screen min-h-screen bg-red-300 flex justify-center items-center" >
        <div class= " max-w-5xl p-10 mx-auto w-full flex  gap-6 justify-between items-center bg-white rounded-2xl">
            <div class="w-1/2 bg-[#E2ECFF] rounded-2xl p-5">
                <div class="flex flex-col justify-center item-center p-10 text-center " >
                    <img src="/media/blog_images/1760210173804.jpg" class="w-20 h-20 rounded-3xl" alt="cod" />
                    
                    <h1 class="text-2xl font-bold py-6">Let us help run your own platform</h1>
                    <p>Our registration process is quicker than other platfrom</p>
                </div>
            </div>
            <div class="w-1/2">
                <h1 class="text-2xl font-bold text-center">Get Started</h1>
                <p class="text-gray-500 p-5 text-center">Create your account now !</p>
                <form method="POST" action="" class="space-y-4">
                     {%  csrf_token %}
                    <div class="py-4">
                        <label class="fName">Full Name:</label>
                        <input type="text" name="fName" id="fName" placeholder="Alex"
                          class="w-full border border-gray-500 rounded-2xl px-4 py-3 focus:outline-none text-black"/>
                    </div>
                    <div>
                        <label class="fEmail">Email:</label>
                        <input type="email" name="fEmail" id="fEmail" placeholder="alex@gmail.com" class="w-full border border-gray-500 rounded-2xl px-4 py-3 focus:outline-none text-black"/>
                    </div>
                    <div class="py-4">
                        <label class="fPassword">Password:</label>
                        <input type="password" name="fPassword" id="fPassword" placeholder="Enter your password" class="w-full border border-gray-500 rounded-2xl px-4 py-3 focus:outline-none text-black"/>
                    </div>

                    <button type="submit" class ="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold">Sing Up</button>
                </form>

            </div>
        </div>
    </div>
   

</body>
</html>
